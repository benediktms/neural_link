name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.7"

      - name: Install dependencies
        run: gleam deps download

      - name: Check formatting
        run: gleam format --check src test

      - name: Build
        run: gleam build

      - name: Test
        run: gleam test
